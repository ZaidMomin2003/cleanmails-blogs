name: Generate Blog Post

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC
    - cron: '30 0 * * *'
    # 1:00 PM IST = 07:30 UTC
    - cron: '30 7 * * *'
    # 8:00 PM IST = 14:30 UTC
    - cron: '30 14 * * *'
  workflow_dispatch: # Manual trigger button

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate blog post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node scripts/generate-post.mjs

      - name: Commit and push
        run: |
          git config user.name "Blog Bot"
          git config user.email "bot@cleanmails.online"
          git add content/posts/
          if git diff --staged --quiet; then
            echo "No new post generated. Skipping commit."
          else
            SLUG=$(git diff --staged --name-only | head -1 | sed 's|content/posts/||' | sed 's|\.md||')
            git commit -m "Add post: ${SLUG}"
            git push
            echo "Published: ${SLUG}"
          fi
